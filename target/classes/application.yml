

spring:
  application:
    name: agent-java

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/agent?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=UTC
    username: root
    password: 123456

  cloud:
    nacos:
      server-addr: 127.0.0.1:8848
    openfeign:
      client:
        config:
          ai-agent-service:
            loggerLevel: FULL
logging:
  level:
    com.agent.feign: DEBUG
    com.alibaba.nacos: WARN

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.agent.entity
  configuration:
    map-underscore-to-camel-case: true
server:
  port: 8081
